<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainNet AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#07090f;color:#cbd5e1;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:420px;padding:20px;}
.logo{text-align:center;margin-bottom:32px;}
.logo-title{font-size:24px;font-weight:700;color:#f1f5f9;}
.logo-sub{font-size:12px;color:#475569;margin-top:4px;}
.pills{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.pill{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;}
.p1{background:rgba(139,92,246,0.12);color:#a78bfa;border:0.5px solid rgba(139,92,246,0.25);}
.p2{background:rgba(34,211,238,0.1);color:#22d3ee;border:0.5px solid rgba(34,211,238,0.2);}
.p3{background:rgba(251,191,36,0.1);color:#fbbf24;border:0.5px solid rgba(251,191,36,0.2);}
.card{background:#0d0b1a;border:0.5px solid rgba(139,92,246,0.25);border-radius:16px;padding:32px;}
.tabs{display:flex;margin-bottom:24px;border-bottom:0.5px solid rgba(255,255,255,0.07);}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:#475569;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.active{color:#a78bfa;border-bottom:2px solid #a78bfa;}
.form-section{display:none;}
.form-section.active{display:block;}
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;display:block;}
.form-input{width:100%;background:#07090f;border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#f1f5f9;font-size:13px;outline:none;transition:border 0.2s;}
.form-input:focus{border-color:rgba(139,92,246,0.5);}
.btn{width:100%;background:#7c3aed;color:#ede9fe;border:none;padding:12px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity 0.2s;}
.btn:hover{opacity:0.88;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.msg{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:14px;display:none;}
.msg.error{background:rgba(248,113,113,0.1);border:0.5px solid rgba(248,113,113,0.3);color:#f87171;}
.msg.success{background:rgba(52,211,153,0.1);border:0.5px solid rgba(52,211,153,0.3);color:#34d399;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-title">&#129504; BrainNet AI</div>
    <div class="logo-sub">Brain Tumor MRI Classification &middot; SCC Trust Metric</div>
    <div class="pills">
      <div class="pill p1">GradCAM++</div>
      <div class="pill p2">SCC Trust</div>
      <div class="pill p3">Dual Model</div>
    </div>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>
    <div class="form-section active" id="login-section">
      <div class="msg" id="login-msg"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="doctor@hospital.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-pass" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/>
      </div>
      <button class="btn" id="login-btn" onclick="doLogin()">Login</button>
    </div>
    <div class="form-section" id="register-section">
      <div class="msg" id="reg-msg"></div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Dr. Vandhana"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="doctor@hospital.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="reg-pass" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/>
      </div>
      <div class="form-group">
        <label class="form-label">Hospital (optional)</label>
        <input class="form-input" type="text" id="reg-hospital" placeholder="Apollo Hospital"/>
      </div>
      <button class="btn" id="reg-btn" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>
<script>
if (localStorage.getItem("token")) window.location.href = "/dashboard";
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".form-section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab+"-section").classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
}
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "msg " + type;
  el.style.display = "block";
}
async function doLogin() {
  const email = document.getElementById("login-email").value;
  const pass  = document.getElementById("login-pass").value;
  if (!email || !pass) { showMsg("login-msg","Please fill all fields.","error"); return; }
  const btn = document.getElementById("login-btn");
  btn.disabled = true; btn.textContent = "Logging in...";
  try {
    const fd = new FormData();
    fd.append("username", email);
    fd.append("password", pass);
    const res  = await fetch("/auth/login", { method:"POST", body:fd });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem("token", data.access_token);
      localStorage.setItem("doctor_name", data.name);
      localStorage.setItem("hospital", data.hospital || "");
      window.location.href = "/dashboard";
    } else {
      showMsg("login-msg", data.detail || "Login failed.", "error");
      btn.disabled = false; btn.textContent = "Login";
    }
  } catch(e) {
    showMsg("login-msg","Connection error.","error");
    btn.disabled = false; btn.textContent = "Login";
  }
}
async function doRegister() {
  const name     = document.getElementById("reg-name").value;
  const email    = document.getElementById("reg-email").value;
  const pass     = document.getElementById("reg-pass").value;
  const hospital = document.getElementById("reg-hospital").value;
  if (!name||!email||!pass) { showMsg("reg-msg","Please fill required fields.","error"); return; }
  const btn = document.getElementById("reg-btn");
  btn.disabled = true; btn.textContent = "Creating account...";
  try {
    const res  = await fetch("/auth/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name,email,password:pass,hospital})
    });
    const data = await res.json();
    if (res.ok) {
      showMsg("reg-msg","Account created! Please login.","success");
      btn.disabled = false; btn.textContent = "Create Account";
      setTimeout(() => switchTab("login"), 1500);
    } else {
      showMsg("reg-msg", data.detail || "Registration failed.","error");
      btn.disabled = false; btn.textContent = "Create Account";
    }
  } catch(e) {
    showMsg("reg-msg","Connection error.","error");
    btn.disabled = false; btn.textContent = "Create Account";
  }
}
document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  if (document.getElementById("login-section").classList.contains("active")) doLogin();
  else doRegister();
});
</script>
</body>
</html>
